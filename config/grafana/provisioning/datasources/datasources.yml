# pgquorum -- Grafana datasource provisioning (Phase 5).
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    # Loki is wired in Phase 5b; the datasource is harmless until then.

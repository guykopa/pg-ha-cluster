# pgquorum -- HAProxy routing for the PostgreSQL HA cluster (Phase 2).
#
# Two TCP frontends:
#   - write (:5000) -> the single node whose Patroni /master returns 200
#   - read  (:5001) -> round-robin over nodes whose Patroni /replica returns 200
# Health-checks hit the Patroni REST API (:8008), so routing follows the
# cluster state automatically after a failover.

global
    maxconn 2000
    log stdout format raw local0 info

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    retries 3

# Docker Swarm embedded DNS, so HAProxy can re-resolve service VIPs.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 5s

# --- write: route to the current leader -------------------------------------
frontend write
    bind *:5000
    default_backend pg_write

backend pg_write
    option httpchk
    http-check send meth GET uri /master ver HTTP/1.1 hdr Host localhost
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 pg1:5432 check port 8008 resolvers docker
    server pg2 pg2:5432 check port 8008 resolvers docker
    server pg3 pg3:5432 check port 8008 resolvers docker

# --- read: round-robin over healthy replicas --------------------------------
frontend read
    bind *:5001
    default_backend pg_read

backend pg_read
    balance roundrobin
    option httpchk
    http-check send meth GET uri /replica ver HTTP/1.1 hdr Host localhost
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    server pg1 pg1:5432 check port 8008 resolvers docker
    server pg2 pg2:5432 check port 8008 resolvers docker
    server pg3 pg3:5432 check port 8008 resolvers docker

# --- stats ------------------------------------------------------------------
frontend stats
    bind *:8404
    mode http
    # Built-in Prometheus exporter (Phase 5): scraped at :8404/metrics.
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /
    stats refresh 5s

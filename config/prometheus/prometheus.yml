# pgquorum -- Prometheus scrape configuration (Phase 5).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Patroni native /metrics: cluster role, replication positions, health.
  - job_name: patroni
    metrics_path: /metrics
    static_configs:
      - targets: ['pg1:8008', 'pg2:8008', 'pg3:8008']

  # HAProxy built-in Prometheus exporter (frontend stats :8404/metrics).
  - job_name: haproxy
    metrics_path: /metrics
    static_configs:
      - targets: ['haproxy:8404']

  # PostgreSQL internals (connections, tx, cache hit) via the leader.
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

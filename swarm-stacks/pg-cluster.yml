# pgquorum -- PostgreSQL HA cluster stack (Phase 1).
#
# 3-member etcd cluster (DCS) + 3 Patroni/PostgreSQL nodes (1 leader, 2
# replicas). Each component is its own service so it gets a stable Swarm DNS
# name (etcd1..3, pg1..3) -- required for etcd peer URLs and for the Patroni
# REST API that HAProxy will health-check in Phase 2.
#
# Dev: single-node swarm (all tasks land on the one node). On the 3-node
# target, add placement constraints (one pg per node) -- nothing else changes.
version: "3.8"

# --- etcd (DCS) -------------------------------------------------------------
x-etcd-common: &etcd-common
  image: quay.io/coreos/etcd:v3.5.16
  networks: [net_data]
  deploy:
    replicas: 1
    restart_policy:
      condition: any

x-etcd-env: &etcd-env
  ETCD_INITIAL_CLUSTER: "etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380"
  ETCD_INITIAL_CLUSTER_STATE: "new"
  ETCD_INITIAL_CLUSTER_TOKEN: "pgquorum-etcd"
  ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
  ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
  ETCD_DATA_DIR: "/etcd-data"
  ETCDCTL_API: "3"

# --- Patroni / PostgreSQL ---------------------------------------------------
x-pg-common: &pg-common
  image: pgquorum/patroni:16
  networks: [net_data]
  secrets:
    - pg_superuser_password
    - pg_replication_password
  deploy:
    replicas: 1
    restart_policy:
      condition: any

services:
  etcd1:
    <<: *etcd-common
    hostname: etcd1
    environment:
      <<: *etcd-env
      ETCD_NAME: "etcd1"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd1:2380"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd1:2379"
    volumes:
      - etcd1_data:/etcd-data

  etcd2:
    <<: *etcd-common
    hostname: etcd2
    environment:
      <<: *etcd-env
      ETCD_NAME: "etcd2"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd2:2380"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd2:2379"
    volumes:
      - etcd2_data:/etcd-data

  etcd3:
    <<: *etcd-common
    hostname: etcd3
    environment:
      <<: *etcd-env
      ETCD_NAME: "etcd3"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd3:2380"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd3:2379"
    volumes:
      - etcd3_data:/etcd-data

  pg1:
    <<: *pg-common
    hostname: pg1
    environment:
      PATRONI_SCOPE: "pgquorum"
      PATRONI_NAME: "pg1"
    volumes:
      - pg1_data:/var/lib/postgresql/data

  pg2:
    <<: *pg-common
    hostname: pg2
    environment:
      PATRONI_SCOPE: "pgquorum"
      PATRONI_NAME: "pg2"
    volumes:
      - pg2_data:/var/lib/postgresql/data

  pg3:
    <<: *pg-common
    hostname: pg3
    environment:
      PATRONI_SCOPE: "pgquorum"
      PATRONI_NAME: "pg3"
    volumes:
      - pg3_data:/var/lib/postgresql/data

networks:
  net_data:
    external: true

volumes:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  pg1_data:
  pg2_data:
  pg3_data:

secrets:
  pg_superuser_password:
    external: true
  pg_replication_password:
    external: true

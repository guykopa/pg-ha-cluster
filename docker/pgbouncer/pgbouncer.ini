; pgquorum -- PgBouncer configuration (Phase 2).
; Connection pooler in front of HAProxy. Two logical databases map to the
; write (leader) and read (replicas) HAProxy frontends.

[databases]
appdb    = host=haproxy port=5000 dbname=appdb
appdb_ro = host=haproxy port=5001 dbname=appdb

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication is delegated to PostgreSQL via auth_query: PgBouncer connects
; as auth_user, looks up each client's SCRAM verifier, and validates against
; it. No application password is stored in this file; only the auth_user
; credential lives in userlist.txt (rendered from a Swarm secret at startup).
auth_type   = scram-sha-256
auth_user   = pgbouncer
auth_dbname = appdb
auth_query  = SELECT uname, phash FROM public.user_lookup($1)
auth_file   = /etc/pgbouncer/userlist.txt

; Transaction pooling: a server connection is returned to the pool at the end
; of each transaction (best connection density). Documented trade-off: no
; session-level features (e.g. multi-statement prepared statements, LISTEN).
pool_mode = transaction

max_client_conn   = 1000
default_pool_size = 20

; psql / drivers send parameters PgBouncer does not track in transaction mode.
ignore_startup_parameters = extra_float_digits,options

admin_users = pgbouncer
stats_users = pgbouncer

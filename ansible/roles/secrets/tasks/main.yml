---
# Create docker secrets from vault values (create-if-absent; docker secrets
# are immutable, so existing ones are left untouched).

- name: List existing secrets
  ansible.builtin.command: "docker secret ls --format '{% raw %}{{.Name}}{% endraw %}'"
  register: existing_secrets
  changed_when: false

- name: Create docker secrets from the vault
  ansible.builtin.command:
    cmd: "docker secret create {{ item.name }} -"
    stdin: "{{ item.value }}"
    stdin_add_newline: false   # match `printf '%s'` -- no trailing newline
  loop: "{{ docker_secrets }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in existing_secrets.stdout_lines
  no_log: true

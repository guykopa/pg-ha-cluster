---
# Deploy the HAProxy + PgBouncer stack and provision app/db objects.

- name: Deploy proxy stack
  ansible.builtin.command: >
    docker stack deploy --detach=true
    -c {{ project_root }}/{{ stacks.proxy.file }} {{ stacks.proxy.name }}
  changed_when: false

- name: Find current leader
  ansible.builtin.shell: |
    for n in pg1 pg2 pg3; do
      c=$(docker ps -q -f name={{ stacks.pg_cluster.name }}_$n | head -1)
      [ -z "$c" ] && continue
      docker exec "$c" sh -c 'curl -fsS -m3 localhost:8008/master >/dev/null 2>&1' && { echo "$n"; exit 0; }
    done
    exit 1
  args:
    executable: /bin/bash
  register: pg_leader
  changed_when: false
  retries: 12
  delay: 5
  until: pg_leader.rc == 0

- name: Provision app/pgbouncer roles, appdb and the auth lookup function
  ansible.builtin.shell: |
    docker exec -i $(docker ps -q -f name={{ stacks.pg_cluster.name }}_{{ pg_leader.stdout }} | head -1) \
      psql -U postgres -v ON_ERROR_STOP=1 <<'SQL'
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='app') THEN
        CREATE ROLE app LOGIN PASSWORD '{{ vault_pg_app_password }}';
      ELSE
        ALTER ROLE app LOGIN PASSWORD '{{ vault_pg_app_password }}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='pgbouncer') THEN
        CREATE ROLE pgbouncer LOGIN PASSWORD '{{ vault_pg_pgbouncer_password }}';
      ELSE
        ALTER ROLE pgbouncer LOGIN PASSWORD '{{ vault_pg_pgbouncer_password }}';
      END IF;
    END
    $$;
    SELECT 'CREATE DATABASE appdb OWNER app'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='appdb')\gexec
    \c appdb
    CREATE OR REPLACE FUNCTION public.user_lookup(in i_username text, out uname text, out phash text)
    RETURNS record AS $f$
      SELECT usename, passwd FROM pg_catalog.pg_shadow WHERE usename = i_username;
    $f$ LANGUAGE sql SECURITY DEFINER;
    REVOKE ALL ON FUNCTION public.user_lookup(text) FROM public;
    GRANT EXECUTE ON FUNCTION public.user_lookup(text) TO pgbouncer;
    SQL
  args:
    executable: /bin/bash
  no_log: true
  changed_when: true

---
# Target inventory: a real 3-node Docker Swarm (VM/cloud).
# The SAME roles apply; only the connection and node count change. On a real
# multi-node swarm, add placement constraints to the stacks (one pg per node).
all:
  children:
    swarm_managers:
      hosts:
        node1:
          ansible_host: 10.0.0.11
        node2:
          ansible_host: 10.0.0.12
        node3:
          ansible_host: 10.0.0.13
      vars:
        ansible_user: deploy
        # The first manager bootstraps the swarm; others join.
        swarm_bootstrap_host: node1
